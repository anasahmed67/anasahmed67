<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" width="100%">
  <defs>
    <linearGradient id="footer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="150" fill="url(#footer-grad)"/>
  
  <!-- Animated Wave Layer 1 -->
  <path d="M0,100 Q300,50 600,100 T1200,100 L1200,150 L0,150 Z" fill="#1a0b2e" opacity="0.5">
    <animate attributeName="d" values="M0,100 Q300,50 600,100 T1200,100 L1200,150 L0,150 Z;M0,100 Q300,150 600,100 T1200,100 L1200,150 L0,150 Z;M0,100 Q300,50 600,100 T1200,100 L1200,150 L0,150 Z" dur="6s" repeatCount="indefinite"/>
  </path>
  
  <!-- Animated Wave Layer 2 -->
  <path d="M0,120 Q300,80 600,120 T1200,120 L1200,150 L0,150 Z" fill="#24243e" opacity="0.7">
    <animate attributeName="d" values="M0,120 Q300,80 600,120 T1200,120 L1200,150 L0,150 Z;M0,120 Q300,140 600,120 T1200,120 L1200,150 L0,150 Z;M0,120 Q300,80 600,120 T1200,120 L1200,150 L0,150 Z" dur="8s" repeatCount="indefinite"/>
  </path>
  
  <!-- Quote -->
  <text x="50%" y="50%" text-anchor="middle" font-family="Fira Code, monospace" font-size="16" fill="#A78BFA" filter="url(#glow)">
    "Code is the closest thing we have to turning thought into reality."
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </text>
</svg>
